name: MESA CI

on:
  push:
    branches: [audit/production-readiness, main]
  pull_request:
    branches: [audit/production-readiness, main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

env:
  MESA_RUNTIME_PROFILE: test-isolated
  MESA_LOAD_DOTENV: "false"
  MESA_MODEL_ENABLED: "false"
  MESA_EXTERNAL_PROVIDER_ENABLED: "false"
  MESA_API_KEY: ci-non-secret-placeholder
  MESA_PRINCIPAL_ID: ci-principal
  MESA_PRINCIPAL_STATUS: active

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure isolated runtime path
        run: echo "MESA_STORAGE_ROOT=$RUNNER_TEMP/mesa-storage" >> "$GITHUB_ENV"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pinned uv
        run: python -m pip install "uv==0.9.6"
      - name: Install locked core and test dependencies
        run: uv sync --locked --extra dev
      - name: Dependency, compile, and import checks
        run: |
          uv pip check
          uv run python -m compileall -q mesa_memory mesa_storage mesa_workers mesa_api mesa_client
          uv run python -c "import mesa_memory, mesa_api, mesa_client, mesa_storage, mesa_workers"
      - name: Lint the repository
        run: uv run ruff check .
      - name: Enforce formatting and progressive typing across production packages
        run: |
          uv run python - <<'PY'
          from pathlib import Path

          from black import FileMode, TargetVersion, WriteBack, format_file_in_place

          paths = [
              Path("mesa_memory/worker_runtime.py"),
              Path("mesa_memory/container_health.py"),
              Path("mesa_memory/runtime_entrypoint.py"),
          ]
          mode = FileMode(line_length=88, target_versions={TargetVersion.PY310})
          changed = [
              str(path)
              for path in paths
              if format_file_in_place(path, fast=False, mode=mode, write_back=WriteBack.CHECK)
          ]
          if changed:
              raise SystemExit("Black would reformat: " + ", ".join(changed))
          PY
          uv run mypy \
            mesa_memory mesa_storage mesa_workers mesa_api mesa_client \
            --ignore-missing-imports --explicit-package-bases --follow-imports=skip
      - name: Basic tracked-secret policy
        run: |
          test -z "$(git ls-files '.env' '*.pem' '*.key' '*.p12' '*.pfx')"
          ! git grep -IlE -- 'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY' -- ':!tests/**' ':!.env.example'

  secret-and-graph-assurance:
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      HF_HUB_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
      - name: Scan changed history for verified secrets
        uses: trufflesecurity/trufflehog@v3.95.2
        with:
          path: ./
          version: 3.95.2
      - name: Install graph-audit test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Enforce graph-poisoning guardrail
        run: |
          set +e
          timeout 240s python -m pytest -q tests/test_rbac_leak.py --tb=short \
            --junitxml=rbac-isolation.xml | tee rbac-isolation.log
          rbac_status=${PIPESTATUS[0]}
          timeout 240s python -m pytest -q tests/test_chaos.py --tb=short \
            --junitxml=chaos-saga.xml | tee chaos-saga.log
          chaos_status=${PIPESTATUS[0]}
          timeout 240s python -m pytest -q tests/test_kuzu_isolation.py tests/test_legal_audit.py \
            --tb=short --junitxml=graph-assurance.xml | tee graph-assurance.log
          graph_status=${PIPESTATUS[0]}
          printf 'rbac_exit=%s\nchaos_exit=%s\ngraph_exit=%s\n' \
            "$rbac_status" "$chaos_status" "$graph_status" | tee security-assurance-summary.txt
          test "$rbac_status" -eq 0 -a "$chaos_status" -eq 0 -a "$graph_status" -eq 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-and-graph-assurance
          path: |
            rbac-isolation.log
            rbac-isolation.xml
            chaos-saga.log
            chaos-saga.xml
            graph-assurance.log
            graph-assurance.xml
            security-assurance-summary.txt
          if-no-files-found: warn
          retention-days: 10

  zero-cost-contract:
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      MESA_ZERO_COST_MODE: "true"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure isolated runtime path
        run: echo "MESA_STORAGE_ROOT=$RUNNER_TEMP/mesa-storage" >> "$GITHUB_ENV"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e ".[dev,adapters]"
      - run: python -m pip check
      - name: Verify zero-cost provider selection and configuration parity
        run: >-
          python -m pytest -q
          tests/test_config_edge_cases.py::test_config_zero_cost_mode
          tests/test_adapters.py::test_adapter_factory_auto_detect_zero_cost

  legacy-static-baseline:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    continue-on-error: true
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - name: Record full-tree Black and Mypy debt without masking it as a release gate
        run: |
          set +e
          python - <<'PY' 2>&1 | tee legacy-black.log
          from pathlib import Path

          from black import FileMode, TargetVersion, WriteBack, format_file_in_place

          roots = [
              Path("mesa_memory"),
              Path("mesa_storage"),
              Path("mesa_workers"),
              Path("mesa_api"),
              Path("mesa_client"),
              Path("tests"),
          ]
          mode = FileMode(line_length=88, target_versions={TargetVersion.PY310})
          changed = [
              str(path)
              for root in roots
              for path in root.rglob("*.py")
              if format_file_in_place(path, fast=False, mode=mode, write_back=WriteBack.CHECK)
          ]
          if changed:
              print("Black would reformat:")
              print("\n".join(changed))
              raise SystemExit(1)
          print("Black check passed")
          PY
          black_status=${PIPESTATUS[0]}
          python -m mypy mesa_memory mesa_storage mesa_workers mesa_api mesa_client \
            --ignore-missing-imports --explicit-package-bases \
            2>&1 | tee legacy-mypy.log
          mypy_status=${PIPESTATUS[0]}
          printf 'black_exit=%s\nmypy_exit=%s\n' "$black_status" "$mypy_status" \
            | tee legacy-static-summary.txt
          test "$black_status" -eq 0 -a "$mypy_status" -eq 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: legacy-static-baseline
          path: |
            legacy-black.log
            legacy-mypy.log
            legacy-static-summary.txt
          retention-days: 10

  core-tests:
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure isolated runtime path
        run: echo "MESA_STORAGE_ROOT=$RUNNER_TEMP/mesa-storage" >> "$GITHUB_ENV"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install "uv==0.9.6"
      - run: uv sync --locked --extra dev
      - run: uv pip check
      - name: Security, lifecycle, queue, and worker contracts
        run: >-
          uv run python -m pytest -q
          tests/test_principal_authorization.py
          tests/test_session_principal_route_isolation.py
          tests/test_purge_journal_contract.py
          tests/test_wal_claim_replay_contract.py
          tests/test_durable_dlq_contract.py
          tests/test_queue_admission_contract.py
          tests/test_session_finalization_contract.py
          tests/test_runtime_profiles_contract.py
          tests/test_worker_runtime_contract.py

  migration-dr:
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure isolated runtime path
        run: echo "MESA_STORAGE_ROOT=$RUNNER_TEMP/mesa-storage" >> "$GITHUB_ENV"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pip check
      - run: python -m pytest -q tests/test_migration_closure.py tests/test_recovery_contract.py

  package:
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure isolated runtime path
        run: echo "MESA_STORAGE_ROOT=$RUNNER_TEMP/mesa-storage" >> "$GITHUB_ENV"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
      - name: Build reproducible wheels
        run: |
          SOURCE_DATE_EPOCH=0 python -m pip wheel --no-deps --wheel-dir dist/a .
          rm -rf build
          SOURCE_DATE_EPOCH=0 python -m pip wheel --no-deps --wheel-dir dist/b .
          sha256sum dist/a/*.whl dist/b/*.whl | tee dist/SHA256SUMS
          test "$(cut -d' ' -f1 dist/SHA256SUMS | sort -u | wc -l)" = 1
          ! python -m zipfile -l dist/a/mesa_memory-*.whl | grep -E '(__pycache__|\.pyc$)'
          python -m zipfile -l dist/a/mesa_memory-*.whl | grep -q 'mesa_storage/alembic/versions/'
      - name: Fresh wheel install and CLI smoke
        run: |
          python -m venv wheel-venv
          wheel-venv/bin/python -m pip install dist/a/mesa_memory-*.whl
          wheel-venv/bin/python -m pip check
          wheel-venv/bin/python -c "import mesa_memory, mesa_api, mesa_client, mesa_storage, mesa_workers"
          wheel-venv/bin/mesa-recovery --help
      - uses: actions/upload-artifact@v4
        with:
          name: package-report
          path: dist/
          retention-days: 10

  coverage:
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure isolated runtime path
        run: |
          runtime_lab_root="$RUNNER_TEMP/mesa-lab"
          mkdir -p "$runtime_lab_root/storage"
          echo "MESA_RUNTIME_LAB_ROOT=$runtime_lab_root" >> "$GITHUB_ENV"
          echo "MESA_STORAGE_ROOT=$runtime_lab_root/storage" >> "$GITHUB_ENV"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pip check
      - name: Core and SDK coverage
        run: >-
          python -m pytest -q --cov --cov-fail-under=82
          --cov-report=term-missing --cov-report=xml:coverage.xml
          --cov-report=html:htmlcov --cov-report=json:coverage.json
          -m "not optional_provider and not optional_mcp and not live_external"
          --ignore=tests/test_mem0.py --ignore=tests/go_live_proofs --ignore=tests/bench
      - name: SDK coverage collection contract
        run: python -m pytest --collect-only -q tests/test_async_client_auth_contract.py tests/test_mcp_api_boundary.py
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage.json
            htmlcov/
          retention-days: 10

  optional-integrations:
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure isolated runtime path
        run: |
          runtime_lab_root="$RUNNER_TEMP/mesa-lab"
          mkdir -p "$runtime_lab_root/storage"
          echo "MESA_RUNTIME_LAB_ROOT=$runtime_lab_root" >> "$GITHUB_ENV"
          echo "MESA_STORAGE_ROOT=$runtime_lab_root/storage" >> "$GITHUB_ENV"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e ".[dev,adapters,mcp]"
      - run: python -m pip check
      - name: Mocked optional provider and MCP integration boundaries
        run: >-
          python -m pytest -q
          -m "(optional_provider or optional_mcp) and not live_external"
