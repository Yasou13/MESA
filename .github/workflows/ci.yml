# =============================================================================
# MESA v0.4.1 — GitHub Actions CI/CD Pipeline
#
# Triggers: push/PR to main
# Jobs:
#   1. build         — Lint, type-check, and unit tests with coverage
#   2. security-audit — Zero-Trust RBAC, Chaos Saga, Graph Poisoning gates
# =============================================================================

name: MESA CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ================================================================
  # JOB 1: Build — Formatting, Linting, Typing, Unit Tests
  # ================================================================
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[ml,dev,adapters]
        python -m spacy download xx_ent_wiki_sm
    - name: Install Linting & Typing Tools
      run: pip install black==26.3.1 ruff==0.15.13 mypy==2.1.0
    - name: Check Code Formatting (Black)
      run: black --check mesa_memory/ tests/
    - name: Lint Code (Ruff)
      run: ruff check mesa_memory/ tests/
    - name: Type Check (Mypy)
      run: mypy mesa_memory/ mesa_storage/ mesa_workers/ mesa_api/ --ignore-missing-imports --explicit-package-bases

    - name: Test with pytest
      env:
        MESA_OPENAI_API_KEY: "test-env-key-only"
        MESA_ANTHROPIC_API_KEY: "test-env-key-only"
        OPENAI_API_KEY: "test-env-key-only"
        MESA_API_KEY: "dummy-ci-key-for-testing"
        MESA_REBEL_ENABLED: "false"
      run: |
        export PYTHONPATH=.
        pytest tests/ --cov --cov-report=xml --cov-fail-under=80 --ignore=tests/bench
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false

    - name: Test Zero-Cost Parity
      env:
        MESA_ZERO_COST_MODE: "true"
        MESA_API_KEY: "dummy-ci-key-for-testing"
      run: |
        export PYTHONPATH=.
        make test

  # ================================================================
  # JOB 2: Security & Audit — RBAC, Chaos, Graph Poisoning
  # ================================================================
  security-and-audit:
    runs-on: ubuntu-latest
    needs: build  # Only run if build passes
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[ml,dev,adapters]
        python -m spacy download xx_ent_wiki_sm

    # --------------------------------------------------------------
    # Gate 0: Secrets Scanning (TruffleHog)
    # Validates that no hardcoded credentials or API keys exist.
    # --------------------------------------------------------------
    - name: TruffleHog OSS
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./

    # --------------------------------------------------------------
    # Gate 1: Zero-Trust RBAC Isolation Proof
    # Validates that cross-tenant data leakage is structurally
    # impossible across all DAO retrieval surfaces.
    # --------------------------------------------------------------
    - name: "Gate 1: Zero-Trust RBAC Isolation"
      env:
        PYTHONPATH: "."
      run: |
        echo "=========================================="
        echo "  GATE 1: Cross-Tenant RBAC Leakage Test"
        echo "=========================================="
        pytest tests/test_rbac_leak.py -v --tb=short

    # --------------------------------------------------------------
    # Gate 2: Chaos Engineering — Saga Rollback Resilience
    # Proves the B-7 Saga pattern correctly compensates on
    # simulated LanceDB crashes across insert, bulk, and purge.
    # --------------------------------------------------------------
    - name: "Gate 2: Chaos Saga Rollback Resilience"
      env:
        PYTHONPATH: "."
      run: |
        echo "=========================================="
        echo "  GATE 2: Chaos Saga Rollback Test"
        echo "=========================================="
        pytest tests/test_chaos.py -v --tb=short

    # --------------------------------------------------------------
    # Gate 3: Graph Poisoning Audit
    # Validates legal knowledge graph integrity against the
    # canonical Turkish law reference set. Enforces a hard 5%
    # poisoning rate threshold — exceeding it blocks the merge.
    #
    # Requires a seeded test database. The audit script uses
    # direct aiosqlite against the DB file (no running server).
    # --------------------------------------------------------------
    - name: "Gate 3: Seed Test Database for Graph Audit"
      env:
        PYTHONPATH: "."
      run: |
        python -c "
        import asyncio, os
        from mesa_storage.sqlite_engine import AsyncEngine
        from mesa_storage.schemas import initialize_schema as init_sqlite_schema
        from mesa_storage.kuzu_setup import initialize_schema as init_kuzu_schema
        from mesa_storage.kuzu_provider import KuzuGraphProvider
        import aiosqlite

        async def seed():
            os.makedirs('.ci_storage', exist_ok=True)
            engine = AsyncEngine('.ci_storage/ci_test.db', max_connections=2)
            await engine.initialize()
            await init_sqlite_schema(engine)

            async with aiosqlite.connect('.ci_storage/ci_test.db') as db:
                # Create two valid nodes in SQLite for metadata
                await db.execute(
                    \"\"\"INSERT INTO nodes (id, entity_name, type, is_consolidated, created_at, agent_id, session_id)
                       VALUES ('node-src', 'Dava Konusu', 'ENTITY', 0, datetime('now'), 'ci-agent', 'ci-session')\"\"\"
                )
                await db.execute(
                    \"\"\"INSERT INTO nodes (id, entity_name, type, is_consolidated, created_at, agent_id, session_id)
                       VALUES ('node-tgt', 'TBK Madde 49', 'ENTITY', 0, datetime('now'), 'ci-agent', 'ci-session')\"\"\"
                )
                await db.commit()
            await engine.close()

            # Create edges in KuzuDB
            init_kuzu_schema('.ci_storage/ci_test_graph')
            kuzu = KuzuGraphProvider('.ci_storage/ci_test_graph')
            await kuzu.initialize()
            await kuzu.insert_node('node-src', 'Dava Konusu', 'ci-agent')
            await kuzu.insert_node('node-tgt', 'TBK Madde 49', 'ci-agent')
            await kuzu.insert_edge('node-src', 'node-tgt', 1.0, 'ci-agent')
            
            print('CI test database seeded successfully')

        asyncio.run(seed())
        "

    - name: "Gate 3: Graph Poisoning Audit"
      env:
        PYTHONPATH: "."
      run: |
        echo "=========================================="
        echo "  GATE 3: Graph Poisoning Audit"
        echo "=========================================="
        PYTHONPATH=. python -m mesa_evals.legal_audit \
          --db .ci_storage/ci_test.db \
          --agent-id ci-agent \
          --threshold 0.05

    # --------------------------------------------------------------
    # Cleanup
    # --------------------------------------------------------------
    - name: Cleanup test artifacts
      if: always()
      run: rm -rf .ci_storage .test_storage_tmp

  # ================================================================
  # JOB 3: Installation Verification (Dry-run release testing)
  # ================================================================
  installation-verification:
    runs-on: ubuntu-latest
    needs: [build, security-and-audit]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Build package
      run: |
        python -m pip install --upgrade pip build twine
        python -m build
        
    - name: Verify package installation
      run: |
        # Install the built wheel to verify dependencies resolve correctly
        pip install dist/*.whl
        python -c "from mesa_client import MesaClient; c = MesaClient(); print('OK')"

    - name: Run Canary Smoke Test
      env:
        PYTHONPATH: "."
      run: |
        python scripts/canary_smoke_test.py
