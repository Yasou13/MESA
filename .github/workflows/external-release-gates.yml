name: MESA external release gates

on:
  push:
    branches: [audit/production-readiness, benchmark/**, loggin/**, main]
  pull_request:
    branches: [audit/production-readiness, benchmark/**, loggin/**, main]
  workflow_dispatch:
    inputs:
      run_flow:
        description: Run FLOW-001 lifecycle gate
        required: false
        default: true
        type: boolean
      run_performance:
        description: Run PERF-003 bounded-capacity gate
        required: false
        default: true
        type: boolean
      run_docker:
        description: Run Docker image and Compose gates
        required: false
        default: true
        type: boolean
      run_docs:
        description: Run DOC-002 executable-documentation gate
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  MESA_RUNTIME_PROFILE: test-isolated
  MESA_LOAD_DOTENV: "false"
  MESA_MODEL_ENABLED: "false"
  MESA_EXTERNAL_PROVIDER_ENABLED: "false"
  MESA_API_KEY: ci-non-secret-placeholder
  MESA_PRINCIPAL_ID: ci-principal
  MESA_PRINCIPAL_STATUS: active

jobs:
  flow-e2e:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_flow }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Configure isolated runtime paths
        run: |
          echo "MESA_STORAGE_ROOT=$RUNNER_TEMP/mesa-storage" >> "$GITHUB_ENV"
          echo "MESA_COLD_PATH_TRACE_PATH=$RUNNER_TEMP/mesa-trace/cold-path.jsonl" >> "$GITHUB_ENV"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install "uv==0.9.6"
      - run: uv sync --locked --extra dev
      - run: uv pip check
      - name: Dispatch, receipt, restart, finalization, and isolation flow
        run: >-
          uv run python -m pytest -q --junitxml=flow-e2e.xml
          tests/test_durable_dispatch_contract.py
          tests/test_dispatch_completion_contract.py
          tests/test_downstream_fence_reconciliation_contract.py
          tests/test_session_finalization_contract.py
          tests/test_session_principal_route_isolation.py
          tests/test_principal_authorization.py
          tests/test_worker_runtime_contract.py | tee flow-e2e.log
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: flow-logs
          path: |
            flow-e2e.log
            flow-e2e.xml
          retention-days: 10

  performance-capacity:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_performance }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Configure isolated runtime paths
        run: |
          echo "MESA_STORAGE_ROOT=$RUNNER_TEMP/mesa-storage" >> "$GITHUB_ENV"
          echo "MESA_COLD_PATH_TRACE_PATH=$RUNNER_TEMP/mesa-trace/cold-path.jsonl" >> "$GITHUB_ENV"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install "uv==0.9.6"
      - run: uv sync --locked --extra dev
      - run: uv pip check
      - name: Bounded tenant admission, worker restart, and graph limits
        run: >-
          uv run python -m pytest -q --junitxml=performance-capacity.xml
          tests/test_queue_admission_contract.py
          tests/test_worker_supervision_contract.py
          tests/test_worker_runtime_contract.py
          tests/test_pagerank_coverage.py
          tests/test_entity_consolidation_worker.py | tee performance-capacity.log
      - name: Write factual bounded-capacity summary
        run: >-
          python -c "import json,xml.etree.ElementTree as e; r=e.parse('performance-capacity.xml').getroot(); print(json.dumps({'suite':'bounded-capacity','tests':int(r.attrib.get('tests',0)),'failures':int(r.attrib.get('failures',0)),'errors':int(r.attrib.get('errors',0))},sort_keys=True))" > performance-capacity.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: performance-capacity
          path: |
            performance-capacity.log
            performance-capacity.xml
            performance-capacity.json
          retention-days: 10

  docker-image:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_docker }}
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Configure isolated runtime paths
        run: |
          echo "MESA_STORAGE_ROOT=$RUNNER_TEMP/mesa-storage" >> "$GITHUB_ENV"
          echo "MESA_COLD_PATH_TRACE_PATH=$RUNNER_TEMP/mesa-trace/cold-path.jsonl" >> "$GITHUB_ENV"
      - name: Build, inspect, and smoke the non-root image
        run: |
          set -euo pipefail
          docker build --pull=false --tag mesa-memory:gate . | tee docker-build.log
          test "$(docker image inspect mesa-memory:gate --format '{{.Config.User}}')" = "mesa:mesa"
          docker run --detach --name mesa-gate --publish 127.0.0.1:18000:8000 \
            --volume mesa-gate-data:/var/lib/mesa \
            --env MESA_API_KEY=ci-non-secret-placeholder \
            --env MESA_PRINCIPAL_ID=ci-principal \
            --env MESA_RUNTIME_PROFILE=api-only \
            --env MESA_STORAGE_ROOT=/var/lib/mesa/data \
            mesa-memory:gate
          trap 'docker logs mesa-gate > docker-runtime.log 2>&1 || true; docker rm -f mesa-gate || true; docker volume rm mesa-gate-data || true' EXIT
          for _ in $(seq 1 30); do
            docker exec mesa-gate python -m mesa_memory.container_health && break
            sleep 2
          done
          docker exec mesa-gate python -m mesa_memory.container_health
          docker exec mesa-gate test -d /var/lib/mesa/data
          docker exec mesa-gate sh -c 'printf persisted > /var/lib/mesa/data/gate-marker'
          docker restart mesa-gate
          docker exec mesa-gate test -f /var/lib/mesa/data/gate-marker
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: docker-logs
          path: |
            docker-build.log
            docker-runtime.log
          if-no-files-found: warn
          retention-days: 10

  docker-compose:
    needs: docker-image
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_docker) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Configure isolated runtime paths
        run: |
          echo "MESA_STORAGE_ROOT=$RUNNER_TEMP/mesa-storage" >> "$GITHUB_ENV"
          echo "MESA_COLD_PATH_TRACE_PATH=$RUNNER_TEMP/mesa-trace/cold-path.jsonl" >> "$GITHUB_ENV"
      - name: Render, build, start, restart, and collect topology logs
        env:
          MESA_API_KEY: ci-non-secret-placeholder
          MESA_PRINCIPAL_ID: ci-principal
        run: |
          set -euo pipefail
          project="mesa-gates-${GITHUB_RUN_ID}"
          trap 'docker compose -p "$project" logs --no-color > compose.log 2>&1 || true; docker compose -p "$project" down -v || true' EXIT
          docker compose -p "$project" config --quiet
          docker compose -p "$project" build
          docker compose -p "$project" up -d
          docker compose -p "$project" ps
          for _ in $(seq 1 30); do
            curl --fail --silent --show-error -H "X-API-Key: $MESA_API_KEY" http://127.0.0.1:8000/health && break
            sleep 2
          done
          curl --fail --silent --show-error -H "X-API-Key: $MESA_API_KEY" http://127.0.0.1:8000/health
          unauthenticated_status="$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8000/v3/health)"
          test "$unauthenticated_status" = "401"
          curl --fail --silent --show-error \
            -H "X-API-Key: $MESA_API_KEY" \
            http://127.0.0.1:8000/v3/health > api-canary-health.json
          curl --fail --silent --show-error \
            -H "X-API-Key: $MESA_API_KEY" \
            http://127.0.0.1:8000/health/init > api-canary-readiness.json
          docker compose -p "$project" exec -T mesa-worker python -m mesa_memory.container_health
          docker compose -p "$project" restart mesa-api mesa-worker
          docker compose -p "$project" exec -T mesa-api test -d /var/lib/mesa/data
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: compose-logs
          path: |
            compose.log
            api-canary-health.json
            api-canary-readiness.json
          if-no-files-found: warn
          retention-days: 10

  v4-compose:
    needs: docker-image
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_docker) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Render and start the single-owner V4 topology
        env:
          MESA_API_KEY: ci-non-secret-placeholder
          MESA_PRINCIPAL_ID: ci-principal
          MESA_MODEL_ENABLED: "false"
          MESA_EXTERNAL_PROVIDER_ENABLED: "false"
        run: |
          set -euo pipefail
          project="mesa-v4-gates-${GITHUB_RUN_ID}"
          compose=(docker compose -f docker-compose.v4.yml -p "$project")
          cleanup() {
            status=$?
            "${compose[@]}" ps -a || true
            "${compose[@]}" logs --no-color 2>&1 | tee v4-compose.log || true
            "${compose[@]}" down --remove-orphans -v || true
            return "$status"
          }
          wait_for_health() {
            for _ in $(seq 1 60); do
              if curl --fail --silent --show-error \
                -H "X-API-Key: $MESA_API_KEY" \
                http://127.0.0.1:8000/health; then
                return 0
              fi
              sleep 2
            done
            return 1
          }
          trap cleanup EXIT
          "${compose[@]}" config --quiet
          test "$("${compose[@]}" config --services)" = "mesa-v4"
          "${compose[@]}" build
          # Bootstrap grants before the combined runtime starts so the release
          # gate never introduces a second writer beside the storage owner.
          "${compose[@]}" run --rm --no-deps --entrypoint mesa-v4-admin \
            mesa-v4 grant-role \
            --principal ci-principal --tenant ci-tenant --role OWNER
          "${compose[@]}" run --rm --no-deps --entrypoint mesa-v4-admin \
            mesa-v4 grant-agent \
            --principal ci-principal --agent ci-agent --permission SESSION_CREATE
          "${compose[@]}" up -d --wait --wait-timeout 180
          wait_for_health
          curl --fail --silent --show-error \
            -H "X-API-Key: $MESA_API_KEY" \
            http://127.0.0.1:8000/health > v4-health.json
          curl --fail --silent --show-error -X POST \
            -H "X-API-Key: $MESA_API_KEY" \
            -H "Content-Type: application/json" \
            http://127.0.0.1:8000/v4/catalog/workspaces \
            -d '{"tenant_id":"ci-tenant","workspace_id":"ci-workspace","tenant_name":"CI Tenant","workspace_name":"CI Workspace"}' \
            > v4-workspace.json
          curl --fail --silent --show-error -X POST \
            -H "X-API-Key: $MESA_API_KEY" \
            -H "Content-Type: application/json" \
            http://127.0.0.1:8000/v4/catalog/datasets \
            -d '{"tenant_id":"ci-tenant","workspace_id":"ci-workspace","dataset_id":"ci-dataset","dataset_name":"CI Dataset"}' \
            > v4-dataset.json
          curl --fail --silent --show-error -X POST \
            -H "X-API-Key: $MESA_API_KEY" \
            -H "Content-Type: application/json" \
            http://127.0.0.1:8000/v4/sessions/start \
            -d '{"tenant_id":"ci-tenant","workspace_id":"ci-workspace","dataset_ids":["ci-dataset"],"agent_id":"ci-agent"}' \
            > v4-session.json
          "${compose[@]}" restart mesa-v4
          wait_for_health
          "${compose[@]}" exec -T mesa-v4 python -m mesa_memory.container_health
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: v4-compose-logs
          path: |
            v4-compose.log
            v4-health.json
            v4-workspace.json
            v4-dataset.json
            v4-session.json
          if-no-files-found: warn
          retention-days: 10

  docs-smoke:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_docs }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Configure isolated runtime paths
        run: |
          runtime_lab_root="$RUNNER_TEMP/mesa-lab"
          mkdir -p "$runtime_lab_root/storage" "$runtime_lab_root/trace"
          echo "MESA_RUNTIME_LAB_ROOT=$runtime_lab_root" >> "$GITHUB_ENV"
          echo "MESA_STORAGE_ROOT=$runtime_lab_root/storage" >> "$GITHUB_ENV"
          echo "MESA_COLD_PATH_TRACE_PATH=$runtime_lab_root/trace/cold-path.jsonl" >> "$GITHUB_ENV"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install "uv==0.9.6"
      - run: uv sync --locked --extra dev
      - run: uv pip check
      - name: Run documented canonical commands
        run: |
          uv run python -c "from mesa_memory.runtime_entrypoint import command_for_profile; print(command_for_profile())"
          uv run python -c "from mesa_memory.worker_runtime import run_worker_only; print(run_worker_only.__name__)"
          uv run python -c "from mesa_api import create_v4_router; from mesa_client import AsyncMesaV4Client, MesaV4Client"
          uv run mesa-recovery --help
          uv run mesa-v4-admin --help
          MESA_API_KEY=docs-placeholder MESA_PRINCIPAL_ID=docs-principal \
            MESA_MODEL_ENABLED=false MESA_EXTERNAL_PROVIDER_ENABLED=false \
            docker compose -f docker-compose.v4.yml config --quiet
          uv run python -m pytest -q tests/test_deployment_assets.py tests/test_runtime_profiles_contract.py tests/test_migration_closure.py tests/test_recovery_contract.py tests/test_v4_sdk_contract.py | tee docs-smoke.log
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: docs-smoke
          path: docs-smoke.log
          if-no-files-found: warn
          retention-days: 10

  external-gates-summary:
    needs: [flow-e2e, performance-capacity, docker-image, docker-compose, v4-compose, docs-smoke]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Publish non-authoritative gate summary
        env:
          FLOW: ${{ needs.flow-e2e.result }}
          PERF: ${{ needs.performance-capacity.result }}
          IMAGE: ${{ needs.docker-image.result }}
          COMPOSE: ${{ needs.docker-compose.result }}
          V4_COMPOSE: ${{ needs.v4-compose.result }}
          DOCS: ${{ needs.docs-smoke.result }}
        run: |
          {
            echo '## External release gates'
            echo '| Finding | Job | Result | Evidence artifact |'
            echo '|---|---|---|---|'
            echo "| FLOW-001 | flow-e2e | $FLOW | flow-logs |"
            echo "| PERF-003 | performance-capacity | $PERF | performance-capacity |"
            echo "| DOCKER-001 | docker-image | $IMAGE | docker-logs |"
            echo "| DOCKER-003 / API canary | docker-compose | $COMPOSE | compose-logs |"
            echo "| V4 single storage owner | v4-compose | $V4_COMPOSE | v4-compose-logs |"
            echo "| DOC-002 | docs-smoke | $DOCS | docs-smoke |"
            echo '| CI-002 | MESA CI | see CI workflow | package-report |'
            echo '| COVERAGE-001 | MESA CI coverage | see CI workflow | coverage-report |'
          } >> "$GITHUB_STEP_SUMMARY"
