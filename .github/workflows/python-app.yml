name: MESA CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-ml.txt
    - name: Install Linting & Typing Tools
      run: pip install mypy ruff black
    - name: Check Code Formatting (Black)
      run: black --check mesa_memory/ tests/
    - name: Lint Code (Ruff)
      run: ruff check mesa_memory/ tests/
    - name: Type Check (Mypy)
      run: mypy mesa_memory/ --ignore-missing-imports
    - name: Download spaCy model
      run: python -m spacy download xx_ent_wiki_sm
    - name: Test with pytest
      env:
        MESA_OPENAI_API_KEY: "sk-dummy-key"
        MESA_ANTHROPIC_API_KEY: "sk-dummy-key"
        OPENAI_API_KEY: "sk-dummy-key"
      run: |
        export PYTHONPATH=.
        pytest tests/ --cov=mesa_memory --cov-report=xml
