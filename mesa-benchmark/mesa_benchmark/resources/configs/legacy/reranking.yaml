suite_name: "MESA v0.6.1 Comprehensive Benchmark (CrossEncoder Reranking Enabled)"
iterations: 1
seed: 42

dataset:
  name: "comprehensive_200"
  version: "v2"
  path: "resource://fixtures/legacy/comprehensive_200_dataset.json"
  manifest_path: "resource://manifests/internal/comprehensive-v2.json"
  noise_ratio: 0.0

client:
  name: "mesa_client"
  adapter_class: "mesa_benchmark.clients.mesa_client.MesaClientAdapter"
  timeout_ms: 30000
  parameters:
    verbose: false
    enable_multi_hop: true
    enable_rerank: true
    reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    top_n: 5

evaluation:
  metrics:
    - "hit_at_k"
    - "mrr"
    - "latency"
    - "efficiency"
  llm_judge_model: null
  multi_judge_models: []
  enable_agreement: true

generation:
  enabled: true
  model: null

runtime:
  top_k: 5
  ollama_url: null
  require_independent_judge: true
