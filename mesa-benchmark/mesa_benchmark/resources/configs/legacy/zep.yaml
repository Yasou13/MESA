suite_name: "Zep Baseline Benchmark"
iterations: 1
seed: 42

dataset:
  name: "comprehensive_200"
  version: "v2"
  path: "resource://fixtures/legacy/comprehensive_200_dataset.json"
  manifest_path: "resource://manifests/internal/comprehensive-v2.json"
  noise_ratio: 0.0

client:
  name: "zep_client"
  adapter_class: "mesa_benchmark.clients.zep_client.ZepClientAdapter"
  timeout_ms: 10000
  parameters:
    api_key: "${ZEP_API_KEY}"
    session_id: "benchmark_session"

evaluation:
  metrics:
    - "hit_at_k"
    - "mrr"
    - "latency"
  llm_judge_model: null
  multi_judge_models: []
  enable_agreement: true

generation:
  enabled: true
  model: null

runtime:
  top_k: 5
  ollama_url: null
  require_independent_judge: true
