suite_name: "MESA v0.6.1 Multi-Hop Benchmark (Ollama Remote)"
iterations: 1
seed: 42

dataset:
  name: "comprehensive_multihop_only"
  version: "v2"
  path: "resource://fixtures/internal/comprehensive_multihop_only.json"
  manifest_path: "resource://manifests/internal/multihop-v2.json"
  noise_ratio: 0.0

client:
  name: "mesa_client"
  adapter_class: "mesa_benchmark.clients.mesa_client.MesaClientAdapter"
  timeout_ms: 30000
  parameters:
    verbose: false

evaluation:
  metrics:
    - "hit_at_k"
    - "mrr"
    - "latency"
    - "efficiency"
  llm_judge_model: null
  multi_judge_models: []
  enable_agreement: true

generation:
  enabled: true
  model: null

runtime:
  top_k: 5
  ollama_url: null
  require_independent_judge: true
  track: "graph-ablation"
