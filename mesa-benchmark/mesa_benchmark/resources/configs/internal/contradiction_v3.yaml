suite_name: "MESA v0.7.0 Contradiction Benchmark (Ollama Remote)"
iterations: 1
seed: 42

dataset:
  name: "contradiction_v3"
  version: "v3-seed42"
  path: "resource://fixtures/internal/contradiction_v3.json"
  manifest_path: "resource://manifests/internal/contradiction-v3.json"
  noise_ratio: 0.0

client:
  name: "mesa_client"
  adapter_class: "mesa_benchmark.clients.mesa_client.MesaClientAdapter"
  timeout_ms: 30000
  parameters:
    verbose: false

evaluation:
  metrics:
    - "hit_at_k"
    - "mrr"
    - "latency"
    - "efficiency"
  llm_judge_model: null
  multi_judge_models: []
  enable_agreement: true

generation:
  enabled: true
  model: null

runtime:
  top_k: 5
  ollama_url: null
  require_independent_judge: true
