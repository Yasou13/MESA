suite_name: "MESA vs LoCoMo (International Benchmark)"
iterations: 5
seed: 42

dataset:
  name: "locomo"
  version: "pinned-v2"
  path: "data://external/locomo/dataset.json"
  manifest_path: "resource://manifests/external/locomo.json"
  isolation: "scenario"
  ingest_mode: "sequential"
  noise_ratio: 0.0

client:
  name: "mesa_client"
  adapter_class: "mesa_benchmark.clients.mesa_client.MesaV4ClientAdapter"
  timeout_ms: 15000
  parameters:
    verbose: false

evaluation:
  metrics:
    - "hit_at_k"
    - "mrr"
    - "latency"
    - "efficiency"
  llm_judge_model: null
  multi_judge_models: []
  enable_agreement: true

generation:
  enabled: true
  model: null

runtime:
  top_k: 5
  ollama_url: null
  require_independent_judge: true
