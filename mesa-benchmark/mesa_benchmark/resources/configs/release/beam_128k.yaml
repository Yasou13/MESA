suite_name: "MESA v0.6.1 BEAM Benchmark (Ollama Remote)"
iterations: 1
seed: 42

dataset:
  name: "beam"
  version: "128k-v2"
  path: "data://external/beam/v2/dataset.json"
  manifest_path: "resource://manifests/external/beam-v2.json"
  isolation: "scenario"
  ingest_mode: "sequential"
  noise_ratio: 0.0

client:
  name: "mesa_client"
  adapter_class: "mesa_benchmark.clients.mesa_client.MesaClientAdapter"
  timeout_ms: 30000
  parameters:
    verbose: false

evaluation:
  metrics:
    - "latency"
    - "efficiency"
    - "full_qa"
  llm_judge_model: null
  multi_judge_models: []
  enable_agreement: true

generation:
  enabled: true
  model: null

runtime:
  top_k: 5
  ollama_url: null
  require_independent_judge: true
