suite_name: "Letta/MemGPT Baseline Benchmark"
iterations: 1
seed: 42

dataset:
  name: "comprehensive_200"
  version: "v2"
  path: "mesa_benchmark/datasets/comprehensive_200_dataset.json"
  noise_ratio: 0.0

client:
  name: "letta_client"
  adapter_class: "mesa_benchmark.clients.letta_client.LettaClientAdapter"
  timeout_ms: 15000
  parameters:
    base_url: "http://localhost:8283"
    agent_name: "mesa_benchmark_agent"

evaluation:
  metrics:
    - "hit_at_k"
    - "mrr"
    - "latency"
  llm_judge_model: "openai/qwen3:8b"
  multi_judge_models:
    - "openai/qwen3:8b"
  enable_agreement: true
