suite_name: "Letta/MemGPT Baseline Benchmark"
iterations: 1
seed: 42

dataset:
  name: "comprehensive_200"
  version: "v2"
  path: "mesa-benchmark/mesa_benchmark/datasets/comprehensive_200_dataset.json"
  noise_ratio: 0.0

client:
  name: "letta_client"
  adapter_class: "mesa_benchmark.clients.letta_client.LettaClientAdapter"
  timeout_ms: 15000
  parameters:
    base_url: "http://localhost:8283"
    agent_name: "mesa_benchmark_agent"

evaluation:
  metrics:
    - "hit_at_k"
    - "mrr"
    - "latency"
  llm_judge_model: null
  multi_judge_models: []
  enable_agreement: true

generation:
  enabled: true
  model: null

runtime:
  top_k: 5
  ollama_url: null
  require_independent_judge: true
