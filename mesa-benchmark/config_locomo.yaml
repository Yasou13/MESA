suite_name: "MESA vs LoCoMo (International Benchmark)"
iterations: 5
seed: 42

dataset:
  name: "locomo"
  version: "v1"
  path: "datasets/locomo/dataset.json"
  noise_ratio: 0.0

client:
  name: "mesa_client"
  adapter_class: "mesa_benchmark.clients.mesa_client.MesaClientAdapter"
  timeout_ms: 15000
  parameters:
    verbose: false

evaluation:
  metrics:
    - "hit_at_k"
    - "mrr"
    - "latency"
    - "efficiency"
  llm_judge_model: "gpt-4o-mini"
  multi_judge_models:
    - "gpt-4o-mini"
    - "claude-sonnet-4-20250514"
  enable_agreement: true
