suite_name: "MESA MINI Test"
iterations: 1
seed: 42

dataset:
  name: "mini_dataset"
  version: "v1"
  path: "mesa-benchmark/mesa_benchmark/datasets/mini_dataset.json"
  noise_ratio: 0.0

client:
  name: "mesa_client"
  adapter_class: "mesa_benchmark.clients.mesa_client.MesaClientAdapter"
  timeout_ms: 30000
  parameters:
    verbose: true
    enable_multi_hop: true
    enable_rerank: false
    top_n: 5

evaluation:
  metrics:
    - "hit_at_k"
    - "mrr"
    - "latency"
    - "efficiency"
  llm_judge_model: null
  multi_judge_models: []
  enable_agreement: true

generation:
  enabled: true
  model: null

runtime:
  top_k: 5
  ollama_url: null
  require_independent_judge: true
