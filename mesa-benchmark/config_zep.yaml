suite_name: "Zep Baseline Benchmark"
iterations: 1
seed: 42

dataset:
  name: "comprehensive_200"
  version: "v2"
  path: "mesa_benchmark/datasets/comprehensive_200_dataset.json"
  noise_ratio: 0.0

client:
  name: "zep_client"
  adapter_class: "mesa_benchmark.clients.zep_client.ZepClientAdapter"
  timeout_ms: 10000
  parameters:
    api_key: "${ZEP_API_KEY}"
    session_id: "benchmark_session"

evaluation:
  metrics:
    - "hit_at_k"
    - "mrr"
    - "latency"
  llm_judge_model: "openai/qwen3:8b"
  multi_judge_models:
    - "openai/qwen3:8b"
  enable_agreement: true
