suite_name: "MESA v0.6.1 Comprehensive Benchmark (CrossEncoder Reranking Enabled)"
iterations: 1
seed: 42

dataset:
  name: "comprehensive_200"
  version: "v2"
  path: "mesa-benchmark/mesa_benchmark/datasets/comprehensive_200_dataset.json"
  noise_ratio: 0.0

client:
  name: "mesa_client"
  adapter_class: "mesa_benchmark.clients.mesa_client.MesaClientAdapter"
  timeout_ms: 30000
  parameters:
    verbose: false
    enable_multi_hop: true
    enable_rerank: true
    reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    top_n: 5

evaluation:
  metrics:
    - "hit_at_k"
    - "mrr"
    - "latency"
    - "efficiency"
  llm_judge_model: "openai/qwen3:8b"
  multi_judge_models:
    - "openai/qwen3:8b"
  enable_agreement: true
