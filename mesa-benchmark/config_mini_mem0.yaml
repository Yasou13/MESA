suite_name: "MEM0 MINI Test"
iterations: 1
seed: 42

dataset:
  name: "mini_dataset"
  version: "v1"
  path: "mesa-benchmark/mesa_benchmark/datasets/mini_dataset.json"
  noise_ratio: 0.0

client:
  name: "mem0_client"
  adapter_class: "mesa_benchmark.clients.mem0_client.Mem0ClientAdapter"
  timeout_ms: 120000
  parameters:
    verbose: true

evaluation:
  metrics:
    - "hit_at_k"
    - "mrr"
    - "latency"
    - "efficiency"
  llm_judge_model: "openai/qwen3:8b"
  multi_judge_models:
    - "openai/qwen3:8b"
  enable_agreement: true
