# ──────────────────────────────────────────────────────────────
# MESA Memory System – Docker Compose (API mode)
# ──────────────────────────────────────────────────────────────
version: "3.9"

services:
  mesa-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mesa-api
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    environment:
      - MESA_LLM_PROVIDER=${MESA_LLM_PROVIDER:-mock}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
