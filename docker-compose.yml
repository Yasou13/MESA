name: mesa

x-mesa-runtime: &mesa-runtime
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  image: mesa-memory:0.6.1
  restart: "on-failure:5"
  read_only: true
  tmpfs:
    - /tmp:size=128m,mode=1777
  volumes:
    - mesa-data:/var/lib/mesa
  environment: &mesa-environment
    MESA_API_KEY: ${MESA_API_KEY:?MESA_API_KEY is required}
    MESA_PRINCIPAL_ID: ${MESA_PRINCIPAL_ID:?MESA_PRINCIPAL_ID is required}
    MESA_PRINCIPAL_TYPE: SERVICE
    MESA_PRINCIPAL_STATUS: active
    MESA_STORAGE_ROOT: /var/lib/mesa/data
    MESA_LOAD_DOTENV: "false"
    MESA_MODEL_ENABLED: "false"
    MESA_EXTERNAL_PROVIDER_ENABLED: "false"
    MESA_PORT: "8000"

services:
  mesa-api:
    <<: *mesa-runtime
    environment:
      <<: *mesa-environment
      MESA_RUNTIME_PROFILE: api-only
      MESA_REQUIRE_WORKER_READINESS: "true"
    ports:
      - "127.0.0.1:${MESA_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-m", "mesa_memory.container_health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mesa-worker:
    <<: *mesa-runtime
    environment:
      <<: *mesa-environment
      MESA_RUNTIME_PROFILE: worker-only
    healthcheck:
      test: ["CMD", "python", "-m", "mesa_memory.container_health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mesa-data:
